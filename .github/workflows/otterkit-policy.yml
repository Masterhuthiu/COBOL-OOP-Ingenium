# otterkit-oop.yml

name: Build Multi-File COBOL OOP with Otterkit

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-otterkit:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: insurance
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET Runtimes
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            7.0.x
            8.0.x

      - name: Install Otterkit Tool & Templates
        run: |
          dotnet new install Otterkit.Templates::1.0.45-alpha
          dotnet tool install --global Otterkit --version 1.0.80 || \
          dotnet tool update --global Otterkit --version 1.0.80
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      # BƯỚC 1: Chuẩn bị workspace (Phải chạy trước khi dùng file)
      - name: Prepare build workspace
        run: |
          rm -rf build-app
          mkdir -p build-app/src
          mkdir -p build-app/db
          # Tạo sẵn thư mục export để tránh lỗi DirectoryNotFound của Otterkit
          mkdir -p build-app/.otterkit/OtterkitExport

      # BƯỚC 2: Copy nguồn vào workspace
      - name: Copy sources to workspace
        run: |
          cp -R db/* build-app/db/ 2>/dev/null || echo "No db files"
          cp -R src/* build-app/src/
          echo "ENTRY_FILE=src/Main.cob" >> $GITHUB_ENV

      # BƯỚC 3: Khởi tạo Database (Lúc này build-app/db/init.sql đã tồn tại)
      - name: Init PostgreSQL schema
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          PGPASSWORD=postgres psql -h localhost -U postgres -d insurance -f build-app/db/init.sql

      # BƯỚC 4: Biên dịch COBOL sang C#
      - name: Transpile COBOL with Otterkit
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          cd build-app
          # build-app/src/Main.cob là entry point
          otterkit build -e "$ENTRY_FILE" --free || true

      # BƯỚC 5: Cấu hình .NET và Driver (Chạy sau khi đã có thư mục Export)
      - name: Add PostgreSQL driver (Npgsql)
        run: |
          if [ -d "build-app/.otterkit/OtterkitExport" ]; then
            cd build-app/.otterkit/OtterkitExport
            dotnet add package Npgsql --version 7.0.0
          else
            echo "Warning: OtterkitExport folder not found, skipping Npgsql install."
          fi

      # BƯỚC 6: Kiểm tra và đóng gói kết quả
      - name: Inspect generated files
        run: |
          echo "===== GENERATED C# FILES ====="
          find build-app/.otterkit/OtterkitExport -name "*.cs" || echo "No .cs files generated"
          
      - name: Package build output
        run: |
          zip -r otterkit-build-output.zip build-app/
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: otterkit-build-output
          path: otterkit-build-output.zip